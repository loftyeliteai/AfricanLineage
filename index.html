const HintsPage = ({user,trees}) => {
  const [accepted,setAccepted] = useState([]);
  const [dismissed,setDismissed] = useState([]);
  const [viewR,setViewR] = useState(null);

  const hints = [
    {id:'h1',icon:'🗂️',title:'1948 Gold Coast Census – Possible Match',person:'Your tree',conf:92,desc:'A household record from Accra district may match a family member in your tree. Records list a surname matching your family in Labadi, Greater Accra.',badge:'NEW'},
    {id:'h2',icon:'💍',title:'Marriage Certificate – Possible Match',person:'Your tree',conf:87,desc:'A 1966 marriage certificate from Accra Magistrate Court may match ancestors in your family tree. The record references a ceremony at Wesley Methodist Church.',badge:'NEW'},
    {id:'h3',icon:'🧬',title:'DNA Relative – Possible 3rd Cousin',person:'AfricanLineage DNA Network',conf:78,desc:'Another user shares an estimated 48cM of DNA overlap with profiles in your tree. Their ancestor tree includes Kumasi-region family members.',badge:'DNA'},
    {id:'h4',icon:'📰',title:'Daily Graphic Archive Match',person:'Your tree',conf:71,desc:'A 1990 newspaper article may mention a relative from your family tree in a graduation ceremony announcement.',badge:'NEW'},
    {id:'h5',icon:'⛪',title:'Baptism Record – Possible Ancestor',person:'Your tree',conf:83,desc:'Presbyterian Church baptism record from Kumasi lists a possible ancestor matching your family surname, born in the 1940s.',badge:'NEW'},
    {id:'h6',icon:'🌍',title:'UK Passenger List – Possible Relative',person:'1988 record',conf:65,desc:'A UK passenger manifest from 1988 may list a relative travelling from Accra to London Heathrow for studies.',badge:'NEW'},
  ];

  const visible = hints.filter(h=>!dismissed.includes(h.id));

  return (
    <div>
      <div className="dash-head"><h1>💡 Ancestry Hints</h1><p>Potential matches between your family tree and historical records</p></div>
      <div className="dash-grid mb-3">
        {[['Total Hints',hints.length],['Accepted',accepted.length],['Pending',hints.length-accepted.length-dismissed.length],['Dismissed',dismissed.length]].map(([l,n])=>(
          <div key={l} className="ds-card"><span className="ds-n">{n}</span><span className="ds-l">{l}</span></div>
        ))}
      </div>
      {visible.map(h=>(
        <div key={h.id} className={`hint-card${accepted.includes(h.id)?' accepted':''}`}>
          <div className="flex items-c gap-3 mb-2">
            <span style={{fontSize:'1.65rem'}}>{h.icon}</span>
            <div style={{flex:1}}>
              <div className="flex items-c gap-2 wrap">
                <strong style={{color:'var(--g900)',fontSize:'.95rem'}}>{h.title}</strong>
                <span className={`badge ${h.badge==='DNA'?'badge-blue':'badge-green'}`}>{h.badge}</span>
                {accepted.includes(h.id)&&<span className="badge badge-green">✓ Accepted</span>}
              </div>
              <div style={{fontSize:'.78rem',color:'var(--tl)',marginTop:'.18rem'}}>{h.person}</div>
            </div>
            <div style={{textAlign:'center',flexShrink:0}}>
              <div style={{fontFamily:"'Quicksand',sans-serif",fontWeight:700,fontSize:'1.2rem',color:'var(--g600)'}}>{h.conf}%</div>
              <div style={{fontSize:'.68rem',color:'var(--tl)'}}>match</div>
              <div className="conf-bar"><div className="conf-fill" style={{width:`${h.conf}%`}}/></div>
            </div>
          </div>
          <p style={{fontSize:'.875rem',color:'var(--tm)',lineHeight:1.7,marginBottom:'1rem'}}>{h.desc}</p>
          <div className="flex gap-2">
            {!accepted.includes(h.id)&&<button className="btn btn-primary btn-sm" onClick={()=>setAccepted(a=>[...a,h.id])}>✓ Accept</button>}
            <button className="btn btn-secondary btn-sm" onClick={()=>setViewR(RECORDS[(parseInt(h.id.slice(1),10)-1) % RECORDS.length])}>📄 View Record</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setDismissed(d=>[...d,h.id])}>✕ Dismiss</button>
          </div>
        </div>
      ))}
      {dismissed.length>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setDismissed([])}>↩ Show {dismissed.length} dismissed</button>}
      {viewR&&<RecordDetailModal record={viewR} onClose={()=>setViewR(null)}/>}
    </div>
  );
};

        {[['🗂️','Census Match Found','1948 Gold Coast Census may have a record for your family.','NEW'],['🧬','DNA Connections','3 potential relatives found in our network.','DNA'],['📜','Church Record Found','Baptism record found in Kumasi archives.','NEW']].map(([ic,t,d,b])=>(

          <h3 style={{fontSize:'1rem',color:'var(--g900)',marginBottom:'1rem'}}>🔔 Notifications</h3>

const SettingsPage = ({user, profile, onLogout}) => {
  const [name,setName]   = useState(profile?.full_name||user?.user_metadata?.full_name||'');
  const [region,setRegion] = useState(profile?.region||'');
  const [saved,setSaved] = useState(false);
  const [loading,setLoading] = useState(false);

  const save = async () => {
    setLoading(true);
    await api.saveProfile({id:user.id,full_name:name,region});
    setSaved(true); setLoading(false);
    setTimeout(()=>setSaved(false),2500);
  };

  const changePassword = async () => {
    const np = prompt('Enter new password (min 6 characters):');
    if(!np||np.length<6) return;
    const {error} = await api.updatePassword({userId:user.id,password:np});
    alert(error?`Error: ${error.message}`:'✅ Password updated successfully!');
  };

  const deleteAccount = async () => {
    if(!confirm('Delete your account and ALL data? This cannot be undone.')) return;
    await api.deleteAccount(user.id);
    onLogout();
    alert('Account deleted. Sorry to see you go.');
  };

  const regions = ['West Africa','East Africa','Central Africa','Southern Africa','North Africa','Diaspora – Americas','Diaspora – UK/Europe','Diaspora – Caribbean'];

  return (
    <div style={{maxWidth:580}}>
      <div className="dash-head"><h1>⚙️ Settings</h1><p>Manage your account and preferences</p></div>
      {saved&&<div className="form-ok">✓ Profile saved successfully!</div>}
      <div className="card mb-3">
        <h3 style={{marginBottom:'1rem'}}>Profile Details</h3>
        <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" value={user.email} disabled/></div>
        <div className="form-group"><label className="form-label">Ancestral Region</label>

const App = () => {
  const [user,setUser]       = useState(null);
  const [profile,setProfile] = useState(null);
  const [trees,setTrees]     = useState([]);
  const [page,setPage]       = useState('home');
  const [modal,setModal]     = useState(null);
  const [bootDone,setBootDone] = useState(false);

  // ── Boot: check Supabase session ──
  useEffect(()=>{
    api.getSession().then(({user: sessionUser})=>{
      if(sessionUser){
        setUser(sessionUser);
        loadProfile(sessionUser.id);
        loadTrees(sessionUser.id);
        setPage('dashboard');
      }
      setBootDone(true);
    });
    const unsubscribe = api.onAuthStateChange((nextUser)=>{
      if(nextUser){
        setUser(nextUser);
        loadProfile(nextUser.id);
        loadTrees(nextUser.id);
      } else {
        setUser(null);setProfile(null);setTrees([]);setPage('home');
      }
    });
    return unsubscribe;
  },[]);

  const loadProfile = async (uid) => {
    const data = await api.getProfile(uid);
    setProfile(data);
  };

  const loadTrees = async (uid) => {
    const data = await api.getTrees(uid);
    setTrees(data||[]);
  };

  const handleAuthDone = async (u) => {
    setUser(u);
    await loadProfile(u.id);
    await loadTrees(u.id);
    setModal(null);
    setPage('dashboard');
  };

  const handleLogout = async () => {
    await api.signOut();
    setUser(null);setProfile(null);setTrees([]);setPage('home');
  };

  const navTo = (p) => {
    if(!user&&['dashboard','trees','search','hints','settings'].includes(p)) return setModal('login');
    if(user&&p==='home') return setPage('dashboard');
    setPage(p);
  };

  if(!bootDone) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}><div className="spin"/></div>;

  // ── Sidebar wrapped dashboard ──
  const DashWrap = ({children}) => (
    <div className="dash">
      <div className="sidebar">
        <div className="sb-section">
          <div className="sb-label">Main</div>
          {[['dashboard','🏠','Overview'],['trees','🌳','Family Trees'],['hints','💡','Hints'],['search','🔍','Search'],].map(([k,ic,l])=>(
            <button key={k} className={`sb-item${page===k?' active':''}`} onClick={()=>setPage(k)}>
              <span className="sb-icon">{ic}</span>{l}
            </button>
          ))}
        </div>
        <div className="sb-section">
          <div className="sb-label">Account</div>
          <button className={`sb-item${page==='settings'?' active':''}`} onClick={()=>setPage('settings')}><span className="sb-icon">⚙️</span>Settings</button>
          <button className="sb-item" onClick={handleLogout}><span className="sb-icon">🚪</span>Sign Out</button>
        </div>
        <div style={{padding:'.875rem',marginTop:'auto'}}>
          <div style={{background:'var(--g50)',borderRadius:'var(--r-md)',padding:.875+'rem',fontSize:'.76rem',color:'var(--tl)'}}>
            <div style={{fontWeight:700,color:'var(--g700)',marginBottom:'.3rem'}}>Tree Completion</div>
            <div className="prog"><div className="prog-fill" style={{width:`${Math.min(100,trees.length*20+30)}%`}}/></div>
            <div style={{marginTop:'.3rem'}}>{trees.length} tree{trees.length!==1?'s':''} · Keep growing!</div>
          </div>
        </div>
      </div>
      <div className="dash-main">{children}</div>
    </div>
  );

  return (
    <div className="app">
      <Nav
        user={user} page={page}
        onLogin={()=>setModal('login')}
        onSignup={()=>setModal('signup')}
        onNav={navTo}
        onLogout={handleLogout}
        profile={profile}
      />
      <main style={{flex:1}}>
        {!user && renderPublicPage(page, {onSignup:()=>setModal('signup'), onLogin:()=>setModal('login'), onNav:navTo})}
        {user&&page==='dashboard' && <DashWrap><DashHome user={user} trees={trees} profile={profile} onNav={setPage}/></DashWrap>}
        {user&&page==='trees'     && <DashWrap><TreesPage user={user} trees={trees} reloadTrees={()=>loadTrees(user.id)}/></DashWrap>}
        {user&&page==='search'    && <DashWrap><SearchPage user={user} trees={trees}/></DashWrap>}
        {user&&page==='hints'     && <DashWrap><HintsPage user={user} trees={trees}/></DashWrap>}
        {user&&page==='settings'  && <DashWrap><SettingsPage user={user} profile={profile} onLogout={handleLogout}/></DashWrap>}
      </main>

      {modal==='login'  && <LoginModal  onClose={()=>setModal(null)} onDone={handleAuthDone} onSwitch={()=>setModal('signup')}/>}
      {modal==='signup' && <SignupModal onClose={()=>setModal(null)} onDone={handleAuthDone} onSwitch={()=>setModal('login')}/>}
    </div>
  );
};

// ── Nav component (needs profile for display) ──
const Nav = ({user, page, onLogin, onSignup, onNav, onLogout, profile}) => {
  const name = profile?.full_name || user?.user_metadata?.full_name || user?.email?.split('@')[0];
  return (
    <nav className="nav">
      <div className="nav-logo" onClick={()=>onNav(user ? 'dashboard' : 'home')}>
        <Logo size={30}/>
        <span className="logo-text">African<span>Lineage</span></span>
      </div>
      {!user&&(
        <div className="nav-links">
          {PUBLIC_NAV.filter(([key])=>key!=='home').map(([key,label])=>(
            <button key={key} className={`btn-nav${page===key?' active':''}`} onClick={()=>onNav(key)}>{label}</button>
          ))}
        </div>
      )}
      {user&&(
        <div className="nav-links">
          {[['dashboard','🏠 Overview'],['trees','🌳 Trees'],['search','🔍 Search'],['hints','💡 Hints']].map(([k,l])=>(
            <button key={k} className={`btn-nav${page===k?' active':''}`} onClick={()=>onNav(k)}>{l}</button>
          ))}
        </div>
      )}
      <div className="nav-r">
        {!user?(
          <><button className="btn btn-ghost btn-sm" onClick={onLogin}>Sign in</button>
          <button className="btn btn-primary btn-sm" onClick={onSignup}>Start Your Tree</button></>
        ):(
          <div className="flex items-c gap-2">
            {name&&<span style={{fontSize:'.8rem',color:'var(--tl)',display:'none'}}>{name}</span>}
            <button className="btn btn-ghost btn-sm" onClick={()=>onNav('settings')} title="Settings">⚙️</button>
            <button className="btn btn-ghost btn-sm" onClick={onLogout} title="Sign out">🚪 Sign Out</button>
          </div>
        )}
      </div>
    </nav>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
