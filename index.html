<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AfricanLineage</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.container{padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
button{padding:8px 12px;border:none;border-radius:6px;background:#2d7a38;color:#fff;cursor:pointer}
input{padding:8px;margin:5px 0;width:100%}
.error{color:red;margin-top:10px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// 🔑 INSERT YOUR SUPABASE KEYS
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

let supabase = null;

// Validate Supabase setup BEFORE using it
if (!SUPABASE_URL || SUPABASE_URL.includes("YOUR_")) {
  console.error("Supabase URL not set");
} else if (!SUPABASE_KEY || SUPABASE_KEY.includes("YOUR_")) {
  console.error("Supabase Key not set");
} else {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

function App(){
  const [user,setUser] = useState(null);
  const [email,setEmail] = useState("");
  const [password,setPassword] = useState("");
  const [trees,setTrees] = useState([]);
  const [newTree,setNewTree] = useState("");
  const [error,setError] = useState("");

  useEffect(()=>{
    if (supabase) checkUser();
  },[]);

  const checkUser = async ()=>{
    const { data } = await supabase.auth.getUser();
    if(data?.user){
      setUser(data.user);
      loadTrees(data.user.id);
    }
  }

  const signUp = async ()=>{
    if(!supabase) return setError("Supabase not configured");
    const { error } = await supabase.auth.signUp({ email,password });
    if(error) setError(error.message);
    else alert("Check your email to confirm");
  }

  const login = async ()=>{
    if(!supabase) return setError("Supabase not configured");
    const { data,error } = await supabase.auth.signInWithPassword({ email,password });
    if(error) setError(error.message);
    else{
      setUser(data.user);
      loadTrees(data.user.id);
    }
  }

  const logout = async ()=>{
    await supabase.auth.signOut();
    setUser(null);
    setTrees([]);
  }

  const loadTrees = async (userId)=>{
    const { data, error } = await supabase
      .from("family_trees")
      .select("*")
      .eq("user_id", userId);

    if(error){
      console.error(error);
      setError("Failed to load trees");
    }

    setTrees(data || []);
  }

  const createTree = async ()=>{
    if(!newTree) return;

    const { error } = await supabase.from("family_trees").insert([
      { tree_name:newTree, user_id:user.id }
    ]);

    if(error){
      console.error(error);
      setError("Failed to create tree");
      return;
    }

    setNewTree("");
    loadTrees(user.id);
  }

  // 🔴 If Supabase not configured
  if(!supabase){
    return (
      <div className="container">
        <h2>Setup Required</h2>
        <p>Please add your Supabase credentials:</p>
        <ul>
          <li>SUPABASE_URL</li>
          <li>SUPABASE_ANON_KEY</li>
        </ul>
        <p>Go to Supabase → Settings → API</p>
      </div>
    );
  }

  if(!user){
    return (
      <div className="container">
        <h2>Login / Signup</h2>
        <input placeholder="Email" onChange={e=>setEmail(e.target.value)} />
        <input placeholder="Password" type="password" onChange={e=>setPassword(e.target.value)} />
        <button onClick={login}>Login</button>
        <button onClick={signUp} style={{marginLeft:10}}>Sign Up</button>
        {error && <div className="error">{error}</div>}
      </div>
    );
  }

  return (
    <div className="container">
      <h2>Dashboard</h2>
      <button onClick={logout}>Logout</button>

      <div className="card">
        <h3>Create Family Tree</h3>
        <input value={newTree} onChange={e=>setNewTree(e.target.value)} placeholder="Tree name" />
        <button onClick={createTree}>Create</button>
      </div>

      <div className="card">
        <h3>Your Trees</h3>
        {trees.length === 0 && <p>No trees yet</p>}
        {trees.map(t => (
          <div key={t.id} style={{marginBottom:8}}>
            🌳 {t.tree_name}
          </div>
        ))}
      </div>

      {error && <div className="error">{error}</div>}
    </div>
  );
}

// Basic runtime test
console.log("App initialized successfully");

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
